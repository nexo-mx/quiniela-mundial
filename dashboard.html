<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Quiniela Mundial 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #080b0f;
      --surface: #111418;
      --surface2: #1a1f26;
      --green: #00e676;
      --gold: #ffd60a;
      --text: #f0f2f5;
      --muted: #6b7280;
      --border: rgba(255,255,255,0.08);
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--text);
    }
    .logo span { color: var(--green); }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .avatar {
      width: 36px;
      height: 36px;
      background: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #080b0f;
      cursor: pointer;
    }
    .greeting {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }
    .greeting span { color: var(--text); font-weight: 500; }
    .content { padding: 20px; max-width: 600px; margin: 0 auto; }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .section { margin-bottom: 28px; }
    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .stat-card .stat-value {
      font-family: 'Bebas Neue', cursive;
      font-size: 36px;
      line-height: 1;
      color: var(--green);
    }
    .stat-card .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    /* Pool cards */
    .pool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: border-color 0.2s;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }
    .pool-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--green);
    }
    .pool-card:hover { border-color: var(--green); }
    .pool-card.inactive::before { background: var(--muted); }
    .pool-card.inactive { opacity: 0.6; }
    .pool-info h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .pool-info p {
      font-size: 13px;
      color: var(--muted);
    }
    .pool-badge {
      background: rgba(0,230,118,0.15);
      color: var(--green);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .pool-badge.inactive {
      background: rgba(107,114,128,0.15);
      color: var(--muted);
    }
    /* Group cards */
    .group-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .group-card:hover { border-color: rgba(255,214,10,0.5); }
    .group-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .group-name {
      font-size: 16px;
      font-weight: 600;
    }
    .bolsa {
      text-align: right;
    }
    .bolsa-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .bolsa-amount {
      font-family: 'Bebas Neue', cursive;
      font-size: 24px;
      color: var(--gold);
    }
    .group-meta {
      display: flex;
      gap: 16px;
    }
    .meta-item {
      font-size: 13px;
      color: var(--muted);
    }
    .meta-item span { color: var(--text); font-weight: 500; }
    /* Empty state */
    .empty {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    /* Nav */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 0 12px;
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px;
      cursor: pointer;
      text-decoration: none;
      color: var(--muted);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .nav-item .icon { font-size: 22px; }
    .nav-item.active { color: var(--green); }
    /* Logout btn */
    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }
    .btn-crear {
      display: block;
      width: 100%;
      padding: 14px;
      background: rgba(0,230,118,0.1);
      border: 1px dashed rgba(0,230,118,0.4);
      border-radius: var(--radius);
      color: var(--green);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-crear:hover { background: rgba(0,230,118,0.2); }
    .admin-link {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      text-decoration: none;
      margin-top: 12px;
      padding: 8px;
    }
    .admin-link:hover { color: var(--text); }
    .skeleton {
      background: var(--surface2);
      border-radius: 8px;
      height: 80px;
      margin-bottom: 12px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div class="logo">QUINIELA <span>MX</span></div>
      <div class="header-actions">
        <button class="logout-btn" onclick="logout()">Salir</button>
        <div class="avatar" id="avatar">?</div>
      </div>
    </div>
    <div class="greeting">Hola, <span id="username">...</span> 👋</div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-pts">—</div>
        <div class="stat-label">Mis puntos</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-exact">—</div>
        <div class="stat-label">Exactos</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-pred">—</div>
        <div class="stat-label">Predicciones</div>
      </div>
    </div>

    <!-- Quinielas activas -->
    <div class="section">
      <div class="section-title">⚽ Quinielas activas</div>
      <div id="pools-container">
        <div class="skeleton"></div>
      </div>
    </div>

    <!-- Mis grupos -->
    <div class="section">
      <div class="section-title">👥 Mis grupos</div>
      <div id="groups-container">
        <div class="skeleton"></div>
      </div>
      <a href="grupo.html" class="btn-crear" style="margin-top:12px">+ Crear o unirme a un grupo</a>
    </div>

    <div id="admin-section" style="display:none">
      <a href="admin.html" class="admin-link">⚙️ Panel de administrador</a>
    </div>
  </div>

  <nav class="nav">
    <a href="dashboard.html" class="nav-item active">
      <span class="icon">🏠</span>Inicio
    </a>
    <a href="quiniela.html" class="nav-item">
      <span class="icon">⚽</span>Quiniela
    </a>
    <a href="grupo.html" class="nav-item">
      <span class="icon">👥</span>Mi grupo
    </a>
    <a href="ranking.html" class="nav-item">
      <span class="icon">🏆</span>Ranking
    </a>
  </nav>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBZSyB2k9h4a0prlXjQLOjRi6Qa180VyfY",
      authDomain: "quiniela-mundial-e328f.firebaseapp.com",
      projectId: "quiniela-mundial-e328f",
      storageBucket: "quiniela-mundial-e328f.firebasestorage.app",
      messagingSenderId: "994307754524",
      appId: "1:994307754524:web:5eb600cb10bf7d90c76dd9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let userData = null;

    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = 'index.html'; return; }
      currentUser = user;
      const doc = await db.collection('users').doc(user.uid).get();
      userData = doc.data();
      document.getElementById('username').textContent = userData.username;
      document.getElementById('avatar').textContent = userData.username[0].toUpperCase();
      if (userData.isAdmin) document.getElementById('admin-section').style.display = 'block';
      loadPools();
      loadGroups();
      loadStats();
    });

    async function loadStats() {
      const pts = await db.collection('matchPoints').where('userId', '==', currentUser.uid).get();
      let total = 0, exact = 0;
      pts.forEach(d => { total += d.data().points; if (d.data().points === 3) exact++; });
      const preds = await db.collection('predictions').where('userId', '==', currentUser.uid).get();
      document.getElementById('stat-pts').textContent = total;
      document.getElementById('stat-exact').textContent = exact;
      document.getElementById('stat-pred').textContent = preds.size;
    }

    async function loadPools() {
      const snap = await db.collection('pools').orderBy('createdAt', 'asc').get();
      const container = document.getElementById('pools-container');
      if (snap.empty) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>No hay quinielas activas aún</div>';
        return;
      }
      container.innerHTML = '';
      snap.forEach(doc => {
        const p = doc.data();
        const active = p.isActive;
        const card = document.createElement('a');
        card.href = `quiniela.html?pool=${doc.id}`;
        card.className = `pool-card${active ? '' : ' inactive'}`;
        card.innerHTML = `
          <div class="pool-info">
            <h3>${p.name}</h3>
            <p>${phaseLabel(p.phase)}</p>
          </div>
          <span class="pool-badge${active ? '' : ' inactive'}">${active ? 'Activa' : 'Cerrada'}</span>
        `;
        container.appendChild(card);
      });
    }

    async function loadGroups() {
      const snap = await db.collection('groups').where('members', 'array-contains', currentUser.uid).get();
      const container = document.getElementById('groups-container');
      if (snap.empty) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">👥</div>Aún no estás en ningún grupo</div>';
        return;
      }
      container.innerHTML = '';
      snap.forEach(doc => {
        const g = doc.data();
        const memberCount = g.members ? g.members.length : 1;
        const bolsa = memberCount * (g.entryFee || 0);
        const card = document.createElement('a');
        card.href = `grupo.html?group=${doc.id}`;
        card.className = 'group-card';
        card.innerHTML = `
          <div class="group-header">
            <div class="group-name">${g.name}</div>
            <div class="bolsa">
              <div class="bolsa-label">Bolsa</div>
              <div class="bolsa-amount">$${bolsa.toLocaleString()}</div>
            </div>
          </div>
          <div class="group-meta">
            <div class="meta-item">👥 <span>${memberCount}</span> integrantes</div>
            <div class="meta-item">💵 <span>$${(g.entryFee||0).toLocaleString()}</span>/persona</div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function phaseLabel(phase) {
      const labels = {
        groups: 'Fase de grupos — 48 partidos',
        round_of_16: 'Octavos de final',
        quarterfinals: 'Cuartos de final',
        semifinals: 'Semifinales',
        final: 'Final'
      };
      return labels[phase] || phase;
    }

    function logout() {
      auth.signOut().then(() => window.location.href = 'index.html');
    }
  </script>
</body>
</html>
